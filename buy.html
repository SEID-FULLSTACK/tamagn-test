    <script type="module">
        import { collection, getDocs, query, orderBy, where, or, getDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { signInWithEmailAndPassword, onAuthStateChanged, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { db, auth } from "./js/core/firebase.js";
        import {
            resolveListingImageUrl,
            escapeAttrUrl,
            listingImageOnerrorAttr,
            hasValidListingImageForPublicGrid,
        } from "./js/listing-image-utils.js";
        import { renderPropertyMap, clearPropertyMap, normalizePropertyDataForMap } from "./js/property-map.js";

        const FAV_KEY = "tamagn_favorite_listing_ids";
        let allListings = [];
        let currentMode = "signup";

        function readFavorites() {
            try {
                const raw = localStorage.getItem(FAV_KEY);
                const arr = raw ? JSON.parse(raw) : [];
                return new Set(Array.isArray(arr) ? arr : []);
            } catch {
                return new Set();
            }
        }

        function writeFavorites(set) {
            localStorage.setItem(FAV_KEY, JSON.stringify([...set]));
        }

        window.toggleFavorite = function (listingId, btn) {
            if (!listingId) return;
            const favs = readFavorites();
            const on = favs.has(listingId);
            if (on) favs.delete(listingId);
            else favs.add(listingId);
            writeFavorites(favs);
            const icon = btn?.querySelector("i");
            if (icon) {
                const nowFav = favs.has(listingId);
                icon.classList.remove("fa-solid", "fa-regular", "text-rose-500", "text-white");
                icon.classList.add(nowFav ? "fa-solid" : "fa-regular", "fa-heart", nowFav ? "text-rose-500" : "text-white");
            }
        };

        function inferType(title, description) {
            const t = `${title || ""} ${description || ""}`.toLowerCase();
            if (t.includes("ኮንዶ") || t.includes("condo")) return "condo";
            if (t.includes("አፓር") || t.includes("apartment") || t.includes("flat")) return "apartment";
            if (t.includes("ቪላ") || t.includes("villa") || t.includes("ቤት") || t.includes("house")) return "house";
            return "";
        }

        function matchesPropertyType(data, typeFilter) {
            if (!typeFilter) return true;
            const inferred = inferType(data.title, data.description);
            if (inferred === typeFilter) return true;
            const blob = `${data.title || ""} ${data.description || ""}`.toLowerCase();
            if (typeFilter === "house") return /villa|house|ቤት|ቪላ|ሰፊ ቤት/.test(blob);
            if (typeFilter === "apartment") return /apartment|አፓር|flat|አፓርታማ/.test(blob);
            if (typeFilter === "condo") return /condo|ኮንዶ|condominium/.test(blob);
            return true;
        }

        function getBeds(d) {
            const n = Number(d?.details?.bedrooms);
            return Number.isFinite(n) ? n : 0;
        }

        function getBaths(d) {
            const n = Number(d?.details?.bathrooms);
            return Number.isFinite(n) ? n : 0;
        }

        function applyFilters() {
            const q = (document.getElementById("searchQuery")?.value || "").trim().toLowerCase();
            const priceVal = document.getElementById("filterPrice")?.value || "";
            const bedsMin = parseInt(document.getElementById("filterBeds")?.value || "0", 10) || 0;
            const bathsMin = parseInt(document.getElementById("filterBaths")?.value || "0", 10) || 0;
            const typeFilter = document.getElementById("filterType")?.value || "";

            let minP = 0;
            let maxP = Infinity;
            if (priceVal) {
                const [a, b] = priceVal.split("-").map(Number);
                minP = a || 0;
                maxP = b || Infinity;
            }

            const filtered = allListings.filter(({ id: _id, data }) => {
                if (!hasValidListingImageForPublicGrid(data)) return false;
                const price = Number(data.price) || 0;
                if (price < minP || price > maxP) return false;
                if (getBeds(data) < bedsMin) return false;
                if (getBaths(data) < bathsMin) return false;
                if (!matchesPropertyType(data, typeFilter)) return false;
                if (!q) return true;
                const blob = `${data.title || ""} ${data.location || ""} ${data.description || ""}`.toLowerCase();
                return blob.includes(q);
            });

            renderGrid(filtered);
            const rc = document.getElementById("resultsCount");
            if (rc) rc.textContent = `${filtered.length} ንብረቶች ተገኝተዋል`;
        }

        function renderGrid(items) {
            const displayContainer = document.getElementById("tamagn-display-grid");
            if (!displayContainer) return;

            if (!items.length) {
                displayContainer.innerHTML = `<p class="col-span-full py-16 text-center text-slate-500">ለማጣሪያዎ ተዛማጅ ንብረት የለም።</p>`;
                return;
            }

            const favs = readFavorites();
            displayContainer.innerHTML = items
                .map(({ id, data }) => {
                    const dataString = encodeURIComponent(JSON.stringify(data));
                    const img = escapeAttrUrl(resolveListingImageUrl(data));
                    const priceStr = data.price ? Number(data.price).toLocaleString() : "—";
                    const beds = data.details?.bedrooms ?? "—";
                    const baths = data.details?.bathrooms ?? "—";
                    const area = data.size ? `${data.size} m²` : "—";
                    const addr = data.location || "ቦታ አልተገለጸም";
                    const isFav = favs.has(id);
                    const heartIconClass = isFav
                        ? "fa-solid fa-heart text-rose-500"
                        : "fa-regular fa-heart text-white";

                    return `
            <article class="group flex flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-xl">
                <div class="relative aspect-[4/3] overflow-hidden bg-slate-100">
                    <img src="${img}" alt="" ${listingImageOnerrorAttr()} class="relative z-0 block h-full w-full object-cover opacity-100 transition duration-500 group-hover:scale-105" loading="lazy" decoding="async" />
                    <button type="button" onclick="toggleFavorite('${id}', this)" class="absolute right-3 top-3 flex h-10 w-10 items-center justify-center rounded-full bg-black/35 text-lg shadow-lg backdrop-blur-sm transition hover:bg-black/50" title="Save to favorites" aria-label="Favorite">
                        <i class="${heartIconClass} shrink-0 leading-none" aria-hidden="true"></i>
                    </button>
                </div>
                <div class="flex flex-1 flex-col p-4 sm:p-5">
                    <p class="text-2xl font-extrabold tracking-tight text-slate-900">${priceStr} <span class="text-base font-bold text-slate-500">ETB</span></p>
                    <h3 class="mt-2 line-clamp-2 text-base font-bold text-slate-900">${data.title || "የንብረት ርዕስ"}</h3>
                    <p class="mt-1 line-clamp-2 text-sm font-semibold text-slate-600">${addr}</p>
                    <div class="mt-4 flex flex-wrap gap-3 border-t border-slate-100 pt-4 text-sm font-semibold text-slate-600">
                        <span><i class="fa-solid fa-bed mr-1 text-zillow" aria-hidden="true"></i>${beds} መኝታ</span>
                        <span><i class="fa-solid fa-bath mr-1 text-zillow" aria-hidden="true"></i>${baths} መታጠቢያ</span>
                        <span><i class="fa-solid fa-ruler-combined mr-1 text-zillow" aria-hidden="true"></i>${area}</span>
                    </div>
                    <button type="button" onclick="showDetails('${dataString}')" class="mt-5 w-full rounded-xl bg-zillow-light py-3 text-sm font-bold text-zillow transition hover:bg-zillow hover:text-white">ሙሉ መረጃ</button>
                </div>
            </article>`;
                })
                .join("");
        }

        onAuthStateChanged(auth, async (user) => {
            const authActions = document.getElementById("auth-btns");
            const userProfile = document.getElementById("user-profile");
            const dashboard = document.getElementById("tamagn-display-grid");
            const loginPrompt = document.getElementById("login-prompt");
            const buyMain = document.getElementById("buy-main");
            const nameDisplay = document.getElementById("userNameDisplay");
            const avatar = document.getElementById("avatar");

            if (user) {
                authActions?.classList.add("hidden");
                userProfile?.classList.remove("hidden");
                userProfile?.classList.add("flex");
                loginPrompt?.classList.add("hidden");
                buyMain?.classList.remove("hidden");

                let displayName = user.email.split("@")[0];
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) displayName = userDoc.data().name || displayName;
                } catch (e) {
                    console.error(e);
                }
                if (nameDisplay) nameDisplay.innerText = displayName;
                if (avatar) avatar.innerText = displayName.charAt(0).toUpperCase();
            } else {
                authActions?.classList.remove("hidden");
                userProfile?.classList.add("hidden");
                userProfile?.classList.remove("flex");
                loginPrompt?.classList.remove("hidden");
                buyMain?.classList.add("hidden");
            }
        });

        window.openAuthModal = (mode) => {
            currentMode = mode;
            const modal = document.getElementById("authModal");
            const title = document.getElementById("authTitle");
            const subtitle = document.getElementById("authSubtitle");
            const btn = document.getElementById("authBtn");
            const roleSelect = document.getElementById("userRole");
            const signupName = document.getElementById("signupName");
            const signupPhone = document.getElementById("signupPhone");

            if (mode === "login") {
                title.innerText = "ወደ ታማኝ ቤት እንኳን በሰላም መጡ";
                subtitle.innerText = "መግቢያ (Login)";
                btn.innerText = "ግባ";
                roleSelect.style.display = "none";
                if (signupName) signupName.style.display = "none";
                if (signupPhone) signupPhone.style.display = "none";
            } else {
                title.innerText = "አዲስ መመዝገቢያ";
                subtitle.innerText = "አካውንት ይፍጠሩ";
                btn.innerText = "ተመዝገብ";
                roleSelect.style.display = "block";
                if (signupName) signupName.style.display = "block";
                if (signupPhone) signupPhone.style.display = "block";
            }
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        };

        window.closeAuthModal = () => {
            const modal = document.getElementById("authModal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        };

        document.getElementById("authBtn")?.addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const role = document.getElementById("userRole").value;
            try {
                if (currentMode === "login") {
                    await signInWithEmailAndPassword(auth, email, password);
                    alert("እንኳን በደህና መጡ!");
                } else {
                    const user = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", user.user.uid), { role, email });
                    alert("ምዝገባው ተሳክቷል!");
                }
                closeAuthModal();
            } catch (e) {
                alert("ስህተት: " + e.message);
            }
        });

        window.handleGoogleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);
                if (!userDoc.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        role: "buyer"
                    });
                }
                window.location.href = "buy.html";
            } catch (error) {
                console.error(error);
            }
        };

        window.switchMode = () => {
            currentMode = currentMode === "login" ? "signup" : "login";
            openAuthModal(currentMode);
        };

        document.getElementById("closeModal")?.addEventListener("click", closeAuthModal);

        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error(error);
                alert("Logout failed.");
            }
        });

        function escapeHtmlDetail(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function resolvePropertyType(item) {
            const raw =
                item.propertyType ??
                item.type ??
                item.categoryName ??
                item.categoryLabel ??
                (typeof item.category === "string" ? item.category : null) ??
                item.details?.propertyType ??
                null;
            return raw !== null && raw !== "" ? String(raw) : "—";
        }

        window.showDetails = async function (encodedData) {
            try {
                const prevHost = document.getElementById("buy-property-map-host");
                if (prevHost) clearPropertyMap(prevHost);

                const item = JSON.parse(decodeURIComponent(encodedData));
                const modal = document.getElementById("propertyModal");
                const body = document.getElementById("modal-body");
                const phoneRaw = item.seller?.phone || "0000000000";
                const phone = String(phoneRaw).replace(/\D/g, "") || "0000000000";

                const priceDisplay =
                    item.price !== undefined && item.price !== null && item.price !== ""
                        ? `${Number(item.price).toLocaleString()} ETB`
                        : "—";
                const sellerName = escapeHtmlDetail(item.seller?.name);
                const sellerPhoneDisplay = escapeHtmlDetail(item.seller?.phone);
                const description = escapeHtmlDetail(item.description);
                const bedrooms = escapeHtmlDetail(item.details?.bedrooms ?? "—");
                const bathrooms = escapeHtmlDetail(item.details?.bathrooms ?? "—");
                const parking = escapeHtmlDetail(item.details?.parking ?? "—");
                const sizeVal = item.size !== undefined && item.size !== null && item.size !== "" ? item.size : null;
                const sizeDisplay = sizeVal !== null ? `${escapeHtmlDetail(sizeVal)} m²` : "—";
                const location = escapeHtmlDetail(item.location);
                const propertyType = escapeHtmlDetail(resolvePropertyType(item));

                const rows = [
                    { label: "የቤት መለኪያ:", value: propertyType },
                    { label: "ዋጋ:", value: escapeHtmlDetail(priceDisplay) },
                    { label: "የሻጭ ስም:", value: sellerName || "—" },
                    { label: "ስልክ ቁጥር:", value: sellerPhoneDisplay || "—" },
                    { label: "መግለጫ:", value: description || "—", wide: true },
                    { label: "መኝታ ክፍል:", value: bedrooms },
                    { label: "መታጠቢያ ቤት:", value: bathrooms },
                    { label: "መኪና ማቆሚያ:", value: parking },
                    { label: "ስፋት:", value: sizeDisplay },
                    { label: "ቦታ:", value: location || "—", wide: true }
                ];

                const rowHtml = rows
                    .map(
                        (row, idx) => `
                    <div class="${row.wide ? "md:col-span-2" : ""} min-w-0 rounded-xl border px-4 py-3.5 sm:px-5 sm:py-4 ${
                            idx % 2 === 0 ? "border-slate-100 bg-slate-50" : "border-slate-200/80 bg-white"
                        }">
                        <div class="flex min-w-0 flex-col gap-2 md:flex-row md:items-start md:gap-x-6">
                            <dt class="min-w-0 text-xs font-semibold uppercase tracking-wide text-slate-500 md:w-44 md:shrink-0 md:text-sm md:normal-case md:leading-snug md:tracking-normal">${row.label}</dt>
                            <dd class="min-w-0 flex-1 break-words text-sm font-semibold leading-relaxed text-slate-900 md:text-base">${row.value}</dd>
                        </div>
                    </div>`
                    )
                    .join("");

                body.innerHTML = `
                    <div class="min-w-0 w-full space-y-7">
                    <header class="min-w-0 border-b border-slate-200/90 pb-5 pr-11 sm:pr-14">
                        <h2 class="min-w-0 text-xl font-extrabold tracking-tight text-slate-900 break-words sm:text-2xl">የንብረት ዝርዝር መረጃ</h2>
                        <p class="mt-2 min-w-0 text-xs font-medium leading-relaxed text-slate-500 sm:text-sm">Property Detail Information</p>
                    </header>
                    <dl class="grid min-w-0 w-full grid-cols-1 gap-3 md:grid-cols-2 md:gap-x-5 md:gap-y-4">
                        ${rowHtml}
                    </dl>
                    <h3 style="margin-top:20px;">መገኛ (Location on Map)</h3>
                    <div style="width: 100%; height: 300px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd;">
                        <div id="buy-property-map-host" style="width:100%;height:100%;min-height:300px;"></div>
                    </div>
                    <div class="flex flex-wrap items-center justify-center gap-3 border-t border-slate-200 pt-8 sm:gap-4">
                        <a href="https://wa.me/${phone}" target="_blank" rel="noopener" class="inline-flex items-center justify-center gap-2.5 rounded-full border-2 border-emerald-500 px-4 py-2.5 text-sm font-bold text-emerald-600 transition hover:bg-emerald-50"><i class="fa-brands fa-whatsapp shrink-0 text-lg leading-none" aria-hidden="true"></i><span>WhatsApp</span></a>
                        <a href="https://t.me/${phoneRaw}" target="_blank" rel="noopener" class="inline-flex items-center justify-center gap-2.5 rounded-full border-2 border-sky-500 px-4 py-2.5 text-sm font-bold text-sky-600 transition hover:bg-sky-50"><i class="fa-brands fa-telegram shrink-0 text-lg leading-none" aria-hidden="true"></i><span>Telegram</span></a>
                        <a href="tel:${escapeHtmlDetail(phoneRaw)}" class="inline-flex items-center justify-center gap-2.5 rounded-full border-2 border-zillow px-4 py-2.5 text-sm font-bold text-zillow transition hover:bg-zillow-light"><i class="fa-solid fa-phone shrink-0 text-base leading-none" aria-hidden="true"></i><span>Call</span></a>
                    </div>
                    </div>`;
                modal.classList.remove("hidden");
                modal.classList.add("block");
                await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
                const mapHost = document.getElementById("buy-property-map-host");
                await renderPropertyMap(mapHost, normalizePropertyDataForMap(item));
            } catch (e) {
                console.error(e);
            }
        };

        window.closePropertyModal = function () {
            clearPropertyMap(document.getElementById("buy-property-map-host"));
            const modal = document.getElementById("propertyModal");
            modal.classList.add("hidden");
            modal.classList.remove("block");
        };

        async function loadTamagnListings() {
            const displayContainer = document.getElementById("tamagn-display-grid");
            if (!displayContainer) return;

            try {
                const q = query(
                    collection(db, "tamagn_listings"),
                    or(where("scope", "==", "all"), where("scope", "==", "dashboard")),
                    orderBy("createdAt", "desc")
                );
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    allListings = [];
                    displayContainer.innerHTML = `<p class="col-span-full py-12 text-center text-slate-500">በአሁኑ ሰዓት ምንም ንብረት አልተመዘገበም።</p>`;
                    return;
                }
                allListings = [];
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (!hasValidListingImageForPublicGrid(data)) return;
                    allListings.push({ id: docSnap.id, data });
                });
                if (!allListings.length) {
                    displayContainer.innerHTML = `<p class="col-span-full py-12 text-center text-slate-500">በአሁኑ ሰዓት በዝርዝሩ ላይ የሚታይ ንብረት የለም።</p>`;
                    const rc = document.getElementById("resultsCount");
                    if (rc) rc.textContent = "0 ንብረቶች ተገኝተዋል";
                    return;
                }
                applyFilters();
            } catch (error) {
                console.error(error);
            }
        }

        ["filterPrice", "filterBeds", "filterBaths", "filterType"].forEach((id) => {
            document.getElementById(id)?.addEventListener("change", applyFilters);
        });
        document.getElementById("searchBtn")?.addEventListener("click", applyFilters);
        document.getElementById("searchQuery")?.addEventListener("keydown", (e) => {
            if (e.key === "Enter") applyFilters();
        });

        window.addEventListener("DOMContentLoaded", loadTamagnListings);
    </script>

        <div class="tb-mobile-nav__inner">
            <a href="index.html"><i class="fas fa-house font-normal" aria-hidden="true"></i><span>Home</span></a>
            <a href="buy.html" class="tb-mobile-nav__active"><i class="fas fa-building font-normal" aria-hidden="true"></i><span>Listings</span></a>
            <a href="index.html#developers-section"><i class="fas fa-handshake font-normal" aria-hidden="true"></i><span>Developers</span></a>
            <a href="#mortgage-calculator"><i class="fas fa-calculator font-normal" aria-hidden="true"></i><span>Budget</span></a>
            <a href="dashboard.html"><i class="fas fa-heart font-normal" aria-hidden="true"></i><span>Saved</span></a>
            <a href="dashboard.html"><i class="fas fa-comments font-normal" aria-hidden="true"></i><span>Chat</span></a>
            <a href="dashboard.html"><i class="fas fa-bars font-normal" aria-hidden="true"></i><span>Menu</span></a>
        </div>
    </nav>

</body>
